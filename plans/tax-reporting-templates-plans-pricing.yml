      published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://la1.www4.irs.gov/mef
          - https://api.taxjar.com/v2
          - https://rest.avatax.com/api/v2
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://la1.www4.irs.gov/mef
          - https://api.taxjar.com/v2
          - https://rest.avatax.com/api/v2
        unit: 1
        price: '0.00'
        userMultiplied: false
