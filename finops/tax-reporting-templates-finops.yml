specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Tax Reporting Templates
providerId: tax-reporting-templates
publisherName: Tax Reporting Templates
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Compliance
  - Documentation
  - Finance
  - Reporting
  - Tax
  - Templates
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Tax Reporting Templates API surface. Provides a FOCUS-aligned
  mapping for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Tax Reporting Templates
  ServiceCategory: Developer Tools / API
  ProviderName: Tax Reporting Templates
  PublisherName: Tax Reporting Templates
  InvoiceIssuerName: Tax Reporting Templates
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: IRS Modernized e-File (MeF) API
    baseURL: https://la1.www4.irs.gov/mef
    tags:
      - Compliance
      - E-File
      - Federal Tax
      - IRS
      - Tax
    serviceName: IRS Modernized e-File (MeF) API
    serviceCategory: API
  - name: TaxJar API
    baseURL: https://api.taxjar.com/v2
    tags:
      - Compliance
      - Sales Tax
      - Tax
    serviceName: TaxJar API
    serviceCategory: API
  - name: Avalara AvaTax API
    baseURL: https://rest.avatax.com/api/v2
    tags:
      - Compliance
      - Global Tax
      - Sales Tax
      - Tax
    serviceName: Avalara AvaTax API
    serviceCategory: API
  - name: W-2 and 1099 Reporting Templates
    baseURL: ''
    tags:
      - 1099
      - Compliance
      - Payroll
      - Tax
      - W-2
    serviceName: W-2 and 1099 Reporting Templates
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers: []
